<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хан‑Тенири — Центр отдыха</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}
body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:380px;
background:white;
border-radius:30px;
padding:25px 20px 30px;
box-shadow:0 10px 40px rgba(0,0,0,0.15);
text-align:center;
}

/* HEADER */
.header{
background:linear-gradient(180deg,#63d38a,#53c57d);
border-radius:25px;
padding:25px 10px 90px;
margin-bottom:90px;
position:relative;
}

.carousel{
position:absolute;
left:50%;
bottom:-80px;
transform:translateX(-50%);
width:280px;
height:180px;
overflow:hidden;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.carousel img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
left:0;
top:0;
opacity:0;
transition:opacity 0.5s ease;
}

.carousel img.active{
opacity:1;
}

/* TITLE */
.title{
margin-top:10px;
font-size:28px;
font-weight:700;
letter-spacing:1px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

/* BUTTONS */
.btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
margin-bottom:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-weight:600;
font-size:17px;
transition:0.25s;
}

.btn:hover{transform:scale(1.03)}

.instagram{background:#5e9ea7}
.whatsapp{background:#5e9ea7}
.youtube{background:#5e9ea7}

.left{
display:flex;
align-items:center;
gap:14px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

.icon.instagram{background:#ff3d77}
.icon.whatsapp{background:#2cc66a}
.icon.youtube{background:#ff3d3d}

.arrow{
font-size:20px;
opacity:0.8;
}

</style>
</head>
<body>

<div class="container">

<div class="header">

<div class="carousel">
<img src="photo1.jpeg" class="active">
<img src="photo2.jpeg">
<img src="photo3.jpeg">
<img src="photo4.jpeg">
</div>

</div>

<h1 class="title">ХАН‑ТЕНИРИ</h1>
<p class="subtitle">Центр отдыха</p>

<a class="btn instagram" href="https://www.instagram.com/khanteniri.resort/" target="_blank">
<div class="left">
<div class="icon instagram">📷</div>
<div>
Instagram<br>
<span style="font-weight:400;font-size:14px">@khanteniri.resort</span>
</div>
</div>
<div class="arrow">›</div>
</a>

<a class="btn whatsapp" href="https://wa.me/message/WNNIHOKQZY5GJ1" target="_blank">
<div class="left">
<div class="icon whatsapp">💬</div>
<div>
WhatsApp<br>
<span style="font-weight:400;font-size:14px">Написать в WhatsApp</span>
</div>
</div>
<div class="arrow">›</div>
</a>

<a class="btn youtube" href="https://www.youtube.com/@khanteniri.resort" target="_blank">
<div class="left">
<div class="icon youtube">▶</div>
<div>
YouTube<br>
<span style="font-weight:400;font-size:14px">khanteniri.resort</span>
</div>
</div>
<div class="arrow">›</div>
</a>

</div>

<script>
const slides = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(()=>{
slides[index].classList.remove('active');
index = (index + 1) % slides.length;
slides[index].classList.add('active');
},3000);
</script>

</body>
</html>
