<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Хан‑Тенири — Центр отдыха</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}

body{
background:url("bg.jpeg") center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.95);
backdrop-filter:blur(6px);
border-radius:30px;
padding:25px 20px 30px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
text-align:center;
}

/* HEADER */
.header{
background:linear-gradient(180deg,#63d38a,#53c57d);
border-radius:25px;
padding:25px 10px 140px;
margin-bottom:120px;
position:relative;
}

/* BIG CAROUSEL */
.carousel{
position:absolute;
left:50%;
bottom:-120px;
transform:translateX(-50%);
width:100%;
max-width:360px;
overflow:hidden;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
background:#000;
}

.carousel img{
width:100%;
height:auto;
display:none;
}

.carousel img.active{
display:block;
}

/* TITLE */
.title{
margin-top:10px;
font-size:30px;
font-weight:700;
letter-spacing:1px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

/* BUTTONS */
.btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px 18px;
margin-bottom:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-weight:600;
font-size:17px;
transition:0.25s;
}

.btn:hover{transform:scale(1.03)}

.instagram{background:#5e9ea7}
.whatsapp{background:#5e9ea7}
.youtube{background:#5e9ea7}

.left{
display:flex;
align-items:center;
gap:14px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
}

.icon.instagram{background:#ff3d77}
.icon.whatsapp{background:#2cc66a}
.icon.youtube{background:#ff3d3d}

.arrow{
font-size:20px;
opacity:0.8;
}

</style>
</head>
<body>

<script>
const slides = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(()=>{
slides[index].classList.remove('active');
index = (index + 1) % slides.length;
slides[index].classList.add('active');
},2500);
</script>
