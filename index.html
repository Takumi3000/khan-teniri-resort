<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Хан‑Теңири — Центр отдыха</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}

body{
background:url("bg.jpeg") center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 10px;
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(6px);
border-radius:30px;
padding:25px 20px 30px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
text-align:center;
}

/* LOGO */
.logo{
width:110px;
margin:0 auto 15px;
display:block;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:5px;
text-transform: uppercase;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

/* BUTTONS */
.btn{
display:flex;
align-items:center;
padding:16px 18px;
margin-bottom:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-weight:600;
font-size:17px;
transition:0.25s;
}

.btn:hover{transform:scale(1.02)}

.instagram{background:#5e9ea7}
.whatsapp{background:#5e9ea7}
.youtube{background:#5e9ea7}

.icon{
width:36px;
height:36px;
margin-right:14px;
}

.btn-text{
text-align:left;
}

.btn-text span{
font-weight:400;
font-size:14px;
display:block;
margin-top:2px;
}

/* CAROUSEL */
.carousel {
    margin-top: 20px;
    width: 100%;
    height: 250px;
    overflow: hidden;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    background: transparent;
    position: relative;
}

.carousel img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    object-fit: cover; 
}

.carousel img.active {
    opacity: 1;
}

</style>
</head>
<body>

<div class="container">

<img src="Logo.png" class="logo">

<h1 class="title">ХАН‑ТЕҢИРИ</h1>
<p class="subtitle">Центр отдыха</p>

<a class="btn instagram" href="https://www.instagram.com/khanteniri.resort/" target="_blank">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
<div class="btn-text">
Instagram
<span>@khanteniri.resort</span>
</div>
</a>

<a class="btn whatsapp" href="https://wa.me/message/WNNIHOKQZY5GJ1" target="_blank">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<div class="btn-text">
WhatsApp
<span>Написать сообщение</span>
</div>
</a>

<a class="btn youtube" href="https://www.youtube.com/@khanteniri.resort" target="_blank">
<img class="icon" src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
<div class="btn-text">
YouTube
<span>khanteniri.resort</span>
</div>
</a>

<div class="carousel">
<img src="photo1.jpg" class="active" loading="lazy">
<img src="photo2.jpg" loading="lazy">

<img src="photo17.jpg" loading="lazy">
<img src="photo18.jpg" loading="lazy">
<img src="photo19.jpg" loading="lazy">
<img src="photo20.jpg" loading="lazy">

</div>

</div>

<script>
const slides = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(() => {
    slides[index].classList.remove('active');
    index = (index + 1) % slides.length;
    slides[index].classList.add('active');
}, 5000);
</script>

</body>
</html>
