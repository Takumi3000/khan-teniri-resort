<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Хан‑Тенири — Центр отдыха</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial, Helvetica, sans-serif}

body{
background:url("bg.jpeg") center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:flex-start;
padding:30px 10px;
}

.container{
width:100%;
max-width:420px;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(6px);
border-radius:30px;
padding:25px 20px 30px;
box-shadow:0 10px 40px rgba(0,0,0,0.25);
text-align:center;
}

/* LOGO */
.logo{
width:110px;
margin:0 auto 15px;
display:block;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:5px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

/* BUTTONS */
.btn{
display:flex;
align-items:center;
padding:16px 18px;
margin-bottom:15px;
border-radius:15px;
text-decoration:none;
color:white;
font-weight:600;
font-size:17px;
transition:0.25s;
}

.btn:hover{transform:scale(1.02)}

.instagram{background:#5e9ea7}
.whatsapp{background:#5e9ea7}
.youtube{background:#5e9ea7}

.icon{
width:36px;
height:36px;
margin-right:14px;
}

.btn-text{
text-align:left;
}

.btn-text span{
font-weight:400;
font-size:14px;
display:block;
margin-top:2px;
}

/* CAROUSEL (теперь внизу) */
.carousel{
margin-top:20px;
width:100%;
overflow:hidden;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.35);
background:#000;
}

.carousel img{
width:100%;
height:auto;
display:none;
}

.carousel img.active{
display:block;
}

</style>
</head>
<body>

<div class="container">

<img src="Logo.png" class="logo">

<h1 class="title">ХАН‑ТЕНИРИ</h1>
<p class="subtitle">Центр отдыха</p>

</div>
</a>

<img class="icon" src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
<div class="btn-text">
WhatsApp

</a>

<script>
const slides = document.querySelectorAll('.carousel img');
let index = 0;

setInterval(()=>{
slides[index].classList.remove('active');
index = (index + 1) % slides.length;
slides[index].classList.add('active');
},2000);
</script>
